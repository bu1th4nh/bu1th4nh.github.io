        display: inline-block; 
        margin-left: 45px;

    }

        border: 3px solid var(--foreground-color);
    }


</style>

<script>
  const updateTheme = () => {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.style.setProperty('--foreground-color', '#03faff');
      document.documentElement.style.setProperty('--background-color', '#191919');
    } else {
      document.documentElement.style.setProperty('--foreground-color', '#191919');
      document.documentElement.style.setProperty('--background-color', '#fff');
    }
  };

  window.addEventListener('load', updateTheme);
  window.addEventListener('themechange', updateTheme);
</script>

<script>
    // Set the date we're counting down to
    function lpad(value, padding) {
        if(value >= 1000)
            padding = 4;
        else if(value >= 100 && value < 1000)
            padding = 3;
        else 
            padding = 2;
        var zeroes = new Array(padding+1).join("0");
        return (zeroes + value).slice(-padding);
    }

    function timeCountdown2Str(value, end = value) {
        // Find the distance between now and the count down date
        var now_time = new Date().getTime();
        var distance = value - now_time;
    

        // Time calculations for days, hours, minutes and seconds
        var days = Math.floor(distance / (1000 * 60 * 60 * 24));
        var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        var seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // If expired
        if(end - now_time < 0)
            return "ENDED"
        else if(value - now_time < 0)
            return "IN PROGESS"

        // Return the str value
        rtn = "";
        rtn += lpad(days, 3) + ":" + lpad(hours, 2) + ":" + lpad(minutes, 2) + ":" + lpad(seconds, 2);
        return rtn;
    }

    function localTime2Str(y, m, d, hh, mm, ss) {
        return lpad(y, 4) + "/" + lpad(m, 2) + "/" + lpad(d, 2) + " " + lpad(hh, 2) + ":" + lpad(mm, 2) + ":" + lpad(ss, 2) 
    }
    
    

    var GradThesis = new Date("Aug 14, 2023 07:00:00").getTime();


  
    // Update the count down every 1 second
    var x = setInterval(function() {
        // Get today's date and time
        var now      = new Date();
        var now_est  = new Date(new Date().toLocaleString("en-US", {timeZone: "America/New_York"}))
    

        // Display the result: Graduation Thesis
        document.getElementById("countdown-GradThesis").innerHTML = timeCountdown2Str(GradThesis);        
        // Display the local time
        document.getElementById("localtime").innerHTML = localTime2Str(now.getFullYear(), now.getMonth()+1, now.getDate(), now.getHours(), now.getMinutes(), now.getSeconds());
        // Display the UTC time
        document.getElementById("esttime").innerHTML = localTime2Str(now_est.getFullYear(), now_est.getMonth()+1, now_est.getDate(), now_est.getHours(), now_est.getMinutes(), now_est.getSeconds());


        // Display the result: MTM
        document.getElementById("countdown-mtm").innerHTML = timeCountdown2Str(new Date("Jul 09, 2023 10:00:00").getTime());
        // Display the result: CUHKSC
        document.getElementById("countdown-cuhksc").innerHTML = timeCountdown2Str(new Date("Jul 08, 2023 11:00:00").getTime(), new Date("Jul 08, 2023 15:00:00").getTime());
        // Display the result: VEF
        document.getElementById("ddl-vef").innerHTML = timeCountdown2Str(new Date("Jun 30, 2023 10:00:00").getTime());
        // Display the result: IELTS
        document.getElementById("countdown-IELTS").innerHTML = timeCountdown2Str(new Date("May 03, 2023 12:10:00").getTime());


    }, 1000);



</script>
