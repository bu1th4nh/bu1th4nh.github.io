<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">

<style>
    @font-face {
          font-family: 'HornetDisplayBold';
          src: url('https://raw.githubusercontent.com/morkvitnir/hornet-display/main/HornetDisplay-Bold.ttf') format('truetype');
        }
    
    :root {
        --foreground-color: #03faff;
        --background-color: #191919;

        color: var(--foreground-color);
        background-color: var(--background-color);
    }

    #countdown, #localtime, #utctime, #localdate {
        font-family: 'HornetDisplayBold';
        font-size: 50px;
        text-align: center;
    }
</style>

<script>
  const updateTheme = () => {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.style.setProperty('--foreground-color', '#03faff');
      document.documentElement.style.setProperty('--background-color', '#191919');
    } else {
      document.documentElement.style.setProperty('--foreground-color', '#191919');
      document.documentElement.style.setProperty('--background-color', '#fff');
    }
  };

  window.addEventListener('load', updateTheme);
  window.addEventListener('themechange', updateTheme);
</script>

<div style="text-align: center;">
    <!-- UTC time -->
    <div style="display: inline-block; margin-right: 90px;">
        <p style="font-family: 'IBM Plex Mono'; text-align: center; font-size: 20; margin-bottom: 12px;">UTC TIME</p>
        <div id="utctime"></div>
        <p style="font-family: 'HornetDisplayBold';text-align: center;"> (Hour - Minute - Second) </p>
    </div>


    <!-- Local time -->
    <div style="display: inline-block; margin-right: 90px;">
        <p style="font-family: 'IBM Plex Mono'; text-align: center; font-size: 20; margin-bottom: 12px;">LOCAL TIME</p>
        <div id="localtime"></div>
        <p style="font-family: 'HornetDisplayBold';text-align: center;"> (Hour - Minute - Second) </p>
    </div>  
    
    
    <!-- Countdown to next exam -->
    <div style="display: inline-block;">
        <p style="font-family: 'IBM Plex Mono'; text-align: center; font-size: 20; margin-bottom: 12px;">NEXT EXAM IN</p>
        <div id="countdown"></div>
        <p style="font-family: 'HornetDisplayBold';text-align: center;">(Days - Hours - Minutes - Seconds)</p>
    </div> 
</div>





<script>
    // Set the date we're counting down to
    function lpad(value, padding) {
        var zeroes = new Array(padding+1).join("0");
        return (zeroes + value).slice(-padding);
    }
    
    var examDate = new Date("Feb 16, 2023 12:30:00").getTime();
  
    // Update the count down every 1 second
    var x = setInterval(function() {
        // Get today's date and time
        var now_time = new Date().getTime();
        var now      = new Date();
    

        // Find the distance between now and the count down date
        var distance = examDate - now_time;
    


        // Time calculations for days, hours, minutes and seconds
        var days = Math.floor(distance / (1000 * 60 * 60 * 24));
        var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        var seconds = Math.floor((distance % (1000 * 60)) / 1000);
    


        // Display the result in the element with id="countdown"
        document.getElementById("countdown").innerHTML = lpad(days, 2) + ":" + lpad(hours, 2) + ":" + lpad(minutes, 2) + ":" + lpad(seconds, 2);
        
    
        // Display the local time
        document.getElementById("localtime").innerHTML = lpad(now.getFullYear(), 4) + "/" + lpad(now.getMonth()+1, 2) + "/" + lpad(now.getDate(), 2) + " " + lpad(now.getHours(), 2) + ":" + lpad(now.getMinutes(), 2) + ":" + lpad(now.getSeconds(), 2) 


        // Display the UTC time
        document.getElementById("utctime").innerHTML = lpad(now.getUTCFullYear(), 4) + "/" + lpad(now.getUTCMonth()+1, 2) + "/" + lpad(now.getUTCDate(), 2) + " " + lpad(now.getUTCHours(), 2) + ":" + lpad(now.getUTCMinutes(), 2) + ":" + lpad(now.getUTCSeconds(), 2) 

        

    
        // If the count down is finished, write some text 
        if (distance < 0) {
            clearInterval(x);
            document.getElementById("countdown").innerHTML = "EXPIRED";
        }
    }, 1000);



</script>
