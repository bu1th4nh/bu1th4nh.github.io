<style>
    @font-face {
          font-family: 'HornetDisplayBold';
          src: url('https://raw.githubusercontent.com/morkvitnir/hornet-display/main/HornetDisplay-Bold.ttf') format('truetype');
        }
    
    @font-face {

        }
    
    
    
    :root {
        --foreground-color: #03faff;

        color: var(--foreground-color);
        background-color: var(--background-color);
    }

    #countdown-CO, #countdown-TSA, #countdown-SAAD, #countdown-PRJ2, #countdown-NearestExam, #localtime, #utctime, #localdate {

    #line-countdown-box {
        display: inline-block; 
        margin-left: 45px; 
        margin-right: 45px;
    }


</style>

<script>
  const updateTheme = () => {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.style.setProperty('--foreground-color', '#03faff');
      document.documentElement.style.setProperty('--background-color', '#191919');
    } else {
      document.documentElement.style.setProperty('--foreground-color', '#191919');
      document.documentElement.style.setProperty('--background-color', '#fff');
    }
  };

  window.addEventListener('load', updateTheme);
  window.addEventListener('themechange', updateTheme);
</script>

<script>
    // Set the date we're counting down to
    function lpad(value, padding) {
        var zeroes = new Array(padding+1).join("0");
        return (zeroes + value).slice(-padding);
    }

    function timeCountdown2Str(value) {
        // Find the distance between now and the count down date
        var now_time = new Date().getTime();
        var distance = value - now_time;
    

        // Time calculations for days, hours, minutes and seconds
        var days = Math.floor(distance / (1000 * 60 * 60 * 24));
        var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        var seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // If expired
        if(distance < 0)
            return "COUNTDOWN OVER"

        // Return the str value
        rtn = "";
        rtn += lpad(days, 2) + ":" + lpad(hours, 2) + ":" + lpad(minutes, 2) + ":" + lpad(seconds, 2);
        return rtn;
    }

    function localTime2Str(y, m, d, hh, mm, ss) {
        return lpad(y, 4) + "/" + lpad(m, 2) + "/" + lpad(d, 2) + " " + lpad(hh, 2) + ":" + lpad(mm, 2) + ":" + lpad(ss, 2) 
    }
    
    var nearestExamDate     = new Date("Feb 23, 2023 12:30:00").getTime();

    var SAAD_FinalExamDate  = new Date("Mar 01, 2023 12:30:00").getTime();
    var TSA_FinalExamDate   = new Date("Mar 09, 2023 15:00:00").getTime();
    var CO_FinalExamDate    = new Date("Mar 15, 2023 15:00:00").getTime();
    var PRJ2_Date           = new Date("Mar 16, 2023 07:00:00").getTime();


  
    // Update the count down every 1 second
    var x = setInterval(function() {
        // Get today's date and time
        var now      = new Date();
    


        // Display the result: Nearest exam
        document.getElementById("countdown-NearestExam").innerHTML = timeCountdown2Str(nearestExamDate);

        
        
        
        // Display the result: SA&D
        document.getElementById("countdown-SAAD").innerHTML = timeCountdown2Str(SAAD_FinalExamDate);        
        // Display the result: TSA
        document.getElementById("countdown-TSA").innerHTML = timeCountdown2Str(TSA_FinalExamDate);
        // Display the result: CO
        document.getElementById("countdown-CO").innerHTML = timeCountdown2Str(CO_FinalExamDate);
        // Display the result: PRJ2
        document.getElementById("countdown-PRJ2").innerHTML = timeCountdown2Str(PRJ2_Date);

        
    
        // Display the local time
        document.getElementById("localtime").innerHTML = localTime2Str(now.getFullYear(), now.getMonth()+1, now.getDate(), now.getHours(), now.getMinutes(), now.getSeconds());


        // Display the UTC time
        document.getElementById("utctime").innerHTML = localTime2Str(now.getUTCFullYear(), now.getUTCMonth()+1, now.getUTCDate(), now.getUTCHours(), now.getUTCMinutes(), now.getUTCSeconds());

    }, 1000);



</script>
